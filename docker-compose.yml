services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: packetflow-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: packetflow
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d packetflow"]
      interval: 5s
      timeout: 5s
      retries: 5



  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: packetflow-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/packetflow
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: packetflow-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: